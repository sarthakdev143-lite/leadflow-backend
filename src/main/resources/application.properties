spring.application.name=leadflow-backend
spring.data.mongodb.uri=${MONGO_URL}
spring.data.mongodb.auto-index-creation=true

jwt.secret=${JWT_SECRET_TOKEN}
jwt.expiration=${JWT_EXPIRATION_TIME:604800000}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.chat.id=${TELEGRAM_CHAT_ID}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
frontend.url=${FRONTEND_URL}
spring.main.lazy-initialization=false

twilio.account.sid=${WHATSAPP_ACCOUNT_ID}
twilio.auth.token=${WHATSAPP_AUTH_TOKEN}
twilio.whatsapp.number=${WHATSAPP_NUMBER}

# Server Configuration for Load Balancing
server.port=${SERVER_PORT:8080}
instance.id=${INSTANCE_ID:default}

# Redis Configuration for Session Sharing
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.session.store-type=redis
spring.session.redis.namespace=leadflow:session
server.servlet.session.timeout=30m
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

frontend.url=${FRONTEND_URL}
spring.main.lazy-initialization=false


