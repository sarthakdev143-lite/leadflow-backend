upstream leadflow_backend {
    # Round-robin load balancing
    server leadflow-backend-1:8080 max_fails=3 fail_timeout=30s;
    server leadflow-backend-2:8080 max_fails=3 fail_timeout=30s;
    server leadflow-backend-3:8080 max_fails=3 fail_timeout=30s;
    
    # Keep alive connections
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Health check
    location /api/health {
        access_log off;
        proxy_pass http://leadflow_backend;
    }

    location / {
        proxy_pass http://leadflow_backend;
        proxy_http_version 1.1;
        
        # Connection pooling
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
